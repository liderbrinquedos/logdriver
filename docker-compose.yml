services:
  backend:
    build: ./backend
    container_name: liderlog_backend
    volumes:
      - backend_uploads:/app/uploads
      - backend_db:/app/data
    environment:
      - SECRET_KEY=${SECRET_KEY:-liderlog-secret-key-change-in-production-2024}
    restart: always

  frontend:
    image: nginx:alpine
    container_name: liderlog_frontend
    ports:
      - "8021:80"
    volumes:
      - ./LiderLog.html:/usr/share/nginx/html/index.html:ro
      - ./LiderLog.html:/usr/share/nginx/html/LiderLog.html:ro
      - ./manifest.json:/usr/share/nginx/html/manifest.json:ro
      - ./sw.js:/usr/share/nginx/html/sw.js:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: always

volumes:
  backend_uploads:
  backend_db:
