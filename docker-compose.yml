services:
  backend:
    build: ./backend
    container_name: liderlog_backend
    volumes:
      - backend_uploads:/app/uploads
      - backend_db:/app/data
    environment:
      - SECRET_KEY=${SECRET_KEY:-liderlog-secret-key-change-in-production-2024}
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: liderlog_frontend
    ports:
      - "8021:80"
    depends_on:
      - backend
    restart: always

volumes:
  backend_uploads:
  backend_db:
