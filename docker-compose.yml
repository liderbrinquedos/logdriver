services:
  backend:
    build: ./backend
    container_name: liderlog_backend
    volumes:
      - ./backend:/app
      - backend_data:/app/uploads
    # Porta interna 8000, não exposta diretamente para fora
    restart: always

  frontend:
    image: nginx:alpine
    container_name: liderlog_frontend
    ports:
      - "8021:80"
    volumes:
      - ./LiderLog.html:/usr/share/nginx/html/LiderLog.html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: always

volumes:
  backend_data:
