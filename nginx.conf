# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

server {
    listen 80;
    server_name localhost;

    # Gzip compression
    gzip on;
    gzip_min_length 256;
    gzip_types text/html application/json application/javascript text/css application/xml+rss;
    
    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    # Content-Security-Policy (conservador)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:;" always;

    # Frontend - cached aggressively
    location / {
        root /usr/share/nginx/html;
        index LiderLog.html;
        try_files $uri $uri/ /LiderLog.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # API - rate limited, no caching, allow uploads up to 10MB
    location /api/ {
        limit_req zone=api_limit burst=10 nodelay;
        client_max_body_size 10M;
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # No caching
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }
}
